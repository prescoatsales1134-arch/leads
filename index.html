<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lead AI – Leads & Sales Dashboard – Sign in</title>
  <link rel="icon" href="assets/favicon.png" type="image/png" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">
  <main class="auth-card auth-card-form">
    <div class="auth-brand">
      <img src="assets/logo.png" alt="" class="auth-logo-img" />
      <h1>Lead AI – Leads & Sales</h1>
      <p class="auth-tagline">AI-powered leads. Sign in to continue.</p>
    </div>

    <h2 class="auth-form-title" id="auth-form-title">LOGIN</h2>

    <div id="auth-error" class="auth-error" role="alert" style="color:#64748b;background:#f8fafc;">Loading config…</div>

    <!-- Login / Sign up form -->
    <form id="auth-form" class="auth-form">
      <label class="auth-input-wrap" id="auth-first-name-wrap" hidden>
        <span class="auth-input-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </span>
        <input type="text" id="auth-first-name" class="auth-input" placeholder="First name" autocomplete="given-name" />
      </label>
      <label class="auth-input-wrap" id="auth-last-name-wrap" hidden>
        <span class="auth-input-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </span>
        <input type="text" id="auth-last-name" class="auth-input" placeholder="Last name" autocomplete="family-name" />
      </label>
      <label class="auth-input-wrap">
        <span class="auth-input-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </span>
        <input type="email" id="auth-email" class="auth-input" placeholder="Email" autocomplete="email" required />
      </label>
      <label class="auth-input-wrap">
        <span class="auth-input-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input type="password" id="auth-password" class="auth-input" placeholder="Password" autocomplete="current-password" required />
      </label>
      <label class="auth-input-wrap auth-check-wrap" id="auth-remember-wrap">
        <input type="checkbox" id="auth-remember" class="auth-checkbox" />
        <span>Remember me</span>
      </label>
      <label class="auth-input-wrap" id="auth-confirm-wrap" hidden>
        <span class="auth-input-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input type="password" id="auth-password-confirm" class="auth-input" placeholder="Confirm password" autocomplete="new-password" />
      </label>
      <button type="submit" id="auth-submit" class="btn btn-primary btn-block auth-submit" disabled>
        <span id="auth-submit-label">LOGIN</span>
      </button>
    </form>

    <p class="auth-divider"><span>Or continue with</span></p>

    <button type="button" id="google-signin" class="btn btn-google btn-block" disabled>
      <span class="btn-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      </span>
      Google
    </button>

    <p class="auth-switch">
      <span id="auth-switch-prompt">Not a member?</span>
      <button type="button" id="auth-switch-btn" class="auth-link">Sign up now</button>
    </p>
  </main>
  <script>
    (function() {
      var errEl = document.getElementById('auth-error');
      var googleBtn = document.getElementById('google-signin');
      var form = document.getElementById('auth-form');
      var submitBtn = document.getElementById('auth-submit');
      var titleEl = document.getElementById('auth-form-title');
      var switchPrompt = document.getElementById('auth-switch-prompt');
      var switchBtn = document.getElementById('auth-switch-btn');
      var confirmWrap = document.getElementById('auth-confirm-wrap');
      var rememberWrap = document.getElementById('auth-remember-wrap');
      var firstNameWrap = document.getElementById('auth-first-name-wrap');
      var lastNameWrap = document.getElementById('auth-last-name-wrap');
      var submitLabel = document.getElementById('auth-submit-label');
      var isSignUp = false;

      function showErr(msg, isError) {
        errEl.textContent = msg;
        errEl.hidden = false;
        errEl.style.color = isError !== false ? '#b91c1c' : '#64748b';
        errEl.style.background = isError !== false ? '#fef2f2' : '#f8fafc';
      }
      function hideErr() {
        errEl.hidden = true;
        errEl.textContent = '';
      }
      function setLoading(loading) {
        if (loading) {
          errEl.textContent = 'Loading config…';
          errEl.style.color = '#64748b';
          errEl.style.background = '#f8fafc';
          errEl.hidden = false;
        }
      }
      setLoading(true);

      function setFormMode(signUp) {
        isSignUp = signUp;
        titleEl.textContent = signUp ? 'SIGN UP' : 'LOGIN';
        submitLabel.textContent = signUp ? 'Create account' : 'LOGIN';
        switchPrompt.textContent = signUp ? 'Already have an account?' : 'Not a member?';
        switchBtn.textContent = signUp ? 'Log in' : 'Sign up now';
        // LOGIN: only Email + Password (+ Remember me). Sign-up only: First name, Last name, Confirm password.
        var showSignUpOnly = signUp;
        if (firstNameWrap) {
          firstNameWrap.hidden = !showSignUpOnly;
          firstNameWrap.style.display = showSignUpOnly ? '' : 'none';
        }
        if (lastNameWrap) {
          lastNameWrap.hidden = !showSignUpOnly;
          lastNameWrap.style.display = showSignUpOnly ? '' : 'none';
        }
        if (confirmWrap) {
          confirmWrap.hidden = !showSignUpOnly;
          confirmWrap.style.display = showSignUpOnly ? '' : 'none';
        }
        if (rememberWrap) {
          rememberWrap.hidden = signUp;
          rememberWrap.style.display = signUp ? 'none' : '';
        }
        var confirmEl = document.getElementById('auth-password-confirm');
        var firstEl = document.getElementById('auth-first-name');
        var lastEl = document.getElementById('auth-last-name');
        if (confirmEl) confirmEl.required = signUp;
        if (firstEl) firstEl.required = signUp;
        if (lastEl) lastEl.required = signUp;
        hideErr();
      }

      switchBtn.addEventListener('click', function() {
        setFormMode(!isSignUp);
      });

      function runApp() {
        hideErr();
        googleBtn.disabled = false;
        submitBtn.disabled = false;
        setFormMode(false);
        googleBtn.addEventListener('click', function() { auth.signInWithGoogle(); });

        auth.getSession().then(function(session) {
          if (session && session.user) {
            window.location.href = 'about.html';
            return;
          }

          form.addEventListener('submit', function(e) {
            e.preventDefault();
            var email = document.getElementById('auth-email').value.trim();
            var password = document.getElementById('auth-password').value;
            if (!email || !password) return;
            submitBtn.disabled = true;
            hideErr();

            if (isSignUp) {
              var firstName = (document.getElementById('auth-first-name') && document.getElementById('auth-first-name').value) ? document.getElementById('auth-first-name').value.trim() : '';
              var lastName = (document.getElementById('auth-last-name') && document.getElementById('auth-last-name').value) ? document.getElementById('auth-last-name').value.trim() : '';
              var confirm = document.getElementById('auth-password-confirm').value;
              if (confirm !== password) {
                showErr('Passwords do not match');
                submitBtn.disabled = false;
                return;
              }
              auth.signUp(email, password, { first_name: firstName, last_name: lastName })
                .then(function(_ref) {
                  var data = _ref.data, error = _ref.error;
                  if (error) throw new Error(error.message);
                  if (data.user && !data.session) {
                    window.location.href = '/verify-email';
                    return;
                  }
                  showErr('Verify your email. We sent a link to ' + email + '. Once verified, sign in below to open the dashboard.', false);
                  setFormMode(false);
                })
                .catch(function(err) {
                  showErr(err.message || 'Sign up failed');
                })
                .finally(function() { submitBtn.disabled = false; });
            } else {
              auth.signInWithPassword(email, password)
                .then(function(_ref) {
                  var data = _ref.data, error = _ref.error;
                  if (error) throw new Error(error.message);
                  window.location.href = 'about.html';
                })
                .catch(function(err) {
                  showErr(err.message || 'Login failed');
                  submitBtn.disabled = false;
                });
            }
          });
        });
      }

      fetch('/api/env')
        .then(function(r) {
          if (!r.ok) throw new Error('Server returned ' + r.status + '. Run: npm start and open http://localhost:3000');
          return r.json();
        })
        .then(function(env) {
          window.__ENV__ = env || {};
        })
        .then(function() {
          var s = document.createElement('script');
          s.src = 'auth.js';
          s.onload = runApp;
          s.onerror = function() {
            showErr('Could not load auth.js. Open the app from http://localhost:3000');
          };
          document.head.appendChild(s);
        })
        .catch(function(e) {
          showErr(e.message || 'Could not reach server. Run: npm start and open http://localhost:3000');
        });
    })();
  </script>
</body>
</html>
